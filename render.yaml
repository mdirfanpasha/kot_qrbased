services:
  # 1. Main Next.js Web App Service
  - type: web
    name: kotqr-web
    env: node
    plan: free
    buildCommand: "npm install && npx prisma generate && npx prisma db push && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kotqr-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WS_SERVER_URL
        value: "https://kotqr-ws.onrender.com"
      - key: NEXT_PUBLIC_WS_URL
        value: "wss://kotqr-ws.onrender.com"
      - key: WS_SHARED_SECRET
        value: "smartserve-secret-key-123"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://kotqr-web.onrender.com"

  # 2. WebSocket Microservice
  - type: web
    name: kotqr-ws
    env: node
    plan: free
    buildCommand: "npm install ws dotenv"
    startCommand: "node ws-server.js"
    envVars:
      - key: WS_PORT
        value: 10000
      - key: WS_SHARED_SECRET
        value: "smartserve-secret-key-123"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://kotqr-web.onrender.com"

databases:
  # 3. PostgreSQL Database
  - name: kotqr-db
    plan: free
    databaseName: kotqr
